<script id="tat-chart-data" type="application/json">{{ chart_json|safe }}</script>
<div x-data="tatChart()" x-init="init()" class="relative h-72">
  <canvas id="tat-chart-canvas"></canvas>
</div>

<script>
function tatChart() {
  return {
    chart: null,
    init() {
      const existing = Chart.getChart('tat-chart-canvas');
      if (existing) existing.destroy();

      const raw = JSON.parse(document.getElementById('tat-chart-data').textContent);
      const canvas = document.getElementById('tat-chart-canvas');
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createLinearGradient(0, 0, 0, 280);
      gradient.addColorStop(0, 'rgba(59, 130, 246, 0.18)');
      gradient.addColorStop(0.6, 'rgba(59, 130, 246, 0.05)');
      gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

      this.chart = new Chart(canvas, {
        type: 'line',
        data: {
          labels: raw.labels,
          datasets: [{
            label: '平均 TAT（小時）',
            data: raw.values,
            borderColor: '#3b82f6',
            backgroundColor: gradient,
            borderWidth: 2.5,
            tension: 0.45,
            fill: true,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: '#fff',
            pointHoverBorderColor: '#3b82f6',
            pointHoverBorderWidth: 2.5,
            spanGaps: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 700, easing: 'easeInOutQuart' },
          layout: { padding: { top: 8, right: 4, bottom: 0, left: 0 } },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.88)',
              titleColor: '#f1f5f9',
              bodyColor: '#94a3b8',
              padding: { x: 14, y: 10 },
              cornerRadius: 10,
              titleFont: { size: 12, weight: '600', family: "'Inter', sans-serif" },
              bodyFont: { size: 12, family: "'Inter', sans-serif" },
              displayColors: false,
              borderColor: 'rgba(255,255,255,0.07)',
              borderWidth: 1,
              callbacks: {
                title: items => {
                  const d = new Date(items[0].label + 'T00:00:00');
                  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
                },
                label: ctx => ctx.parsed.y === null ? '無資料' : `TAT：${ctx.parsed.y} 小時`
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              border: { display: false },
              grid: { color: 'rgba(15, 23, 42, 0.05)', drawTicks: false },
              ticks: {
                color: '#94a3b8',
                font: { size: 11, family: "'Inter', sans-serif" },
                padding: 8,
                callback: v => `${v}h`
              }
            },
            x: {
              border: { display: false },
              grid: { display: false },
              ticks: {
                color: '#94a3b8',
                font: { size: 11, family: "'Inter', sans-serif" },
                padding: 6,
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: 7,
                callback: function(val) {
                  const label = this.getLabelForValue(val);
                  const d = new Date(label + 'T00:00:00');
                  return `${d.getMonth()+1}/${d.getDate()}`;
                }
              }
            }
          }
        }
      });
    }
  }
}
</script>
