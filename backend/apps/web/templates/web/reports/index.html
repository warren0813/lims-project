{% extends "web/base.html" %}
{% block content %}
<div class="mb-6">
  <h1 class="text-xl font-semibold text-slate-900">Reports</h1>
  <p class="text-slate-500 text-sm mt-0.5">Generate equipment utilization and request statistics</p>
</div>

<div class="grid grid-cols-2 gap-6">
  <!-- Equipment Utilization -->
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
    <div class="flex items-center gap-3 mb-5">
      <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h2 class="font-semibold text-slate-800">Equipment Utilization</h2>
    </div>
    <form hx-get="{% url 'web:reports-utilization' %}"
          hx-target="#utilization-result"
          hx-swap="innerHTML"
          hx-indicator="#util-spinner"
          class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Start Date</label>
          <input type="date" name="start_date" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">End Date</label>
          <input type="date" name="end_date" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
      </div>
      <input type="hidden" name="period" value="custom">
      <div class="flex items-center gap-3">
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg transition cursor-pointer">
          Generate
        </button>
        <span id="util-spinner" class="htmx-indicator text-sm text-slate-400">Loading...</span>
      </div>
    </form>
    <div id="utilization-result" class="mt-4"></div>
  </div>

  <!-- Request Statistics -->
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
    <div class="flex items-center gap-3 mb-5">
      <div class="w-8 h-8 bg-teal-50 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h2 class="font-semibold text-slate-800">Request Statistics</h2>
    </div>
    <form hx-get="{% url 'web:reports-statistics' %}"
          hx-target="#statistics-result"
          hx-swap="innerHTML"
          hx-indicator="#stat-spinner"
          class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Start Date</label>
          <input type="date" name="start_date" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">End Date</label>
          <input type="date" name="end_date" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button type="submit"
                class="bg-teal-600 hover:bg-teal-700 text-white text-sm px-4 py-2 rounded-lg transition cursor-pointer">
          Generate
        </button>
        <span id="stat-spinner" class="htmx-indicator text-sm text-slate-400">Loading...</span>
      </div>
    </form>
    <div id="statistics-result" class="mt-4"></div>
  </div>
</div>
{% endblock %}
