{% extends "web/base.html" %}
{% block content %}
<div class="flex flex-col items-center justify-center py-20">
  <div class="w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center mb-5">
    <svg class="w-8 h-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>
  </div>
  <h1 class="text-xl font-semibold text-slate-900 mb-2">Action Failed</h1>
  <p class="text-slate-500 mb-6 max-w-md text-center text-sm">{{ message }}</p>
  <a href="{{ redirect_url }}" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm transition cursor-pointer">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    Go Back
  </a>
</div>
{% endblock %}
