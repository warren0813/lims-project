{% extends "web/base.html" %}
{% block content %}
<div class="mb-5">
  <a href="{% url 'web:equipment' %}" class="inline-flex items-center gap-1.5 text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    Equipment
  </a>
</div>
<h1 class="text-xl font-semibold text-slate-900 mb-6">New Equipment</h1>

{% if errors %}
<div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-5 flex items-start gap-2.5">
  <svg class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
  </svg>
  <ul class="text-sm text-red-700 space-y-0.5">
    {% for e in errors %}<li>{{ e }}</li>{% endfor %}
  </ul>
</div>
{% endif %}

<form method="post" action="{% url 'web:equipment-create' %}" class="space-y-5 max-w-2xl">
  {% csrf_token %}
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Name <span class="text-red-500">*</span></label>
        <input type="text" name="name" required
               class="w-full border border-slate-300 rounded-lg px-3.5 py-2.5 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Model Name <span class="text-red-500">*</span></label>
        <input type="text" name="model_name" required
               class="w-full border border-slate-300 rounded-lg px-3.5 py-2.5 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Capacity <span class="text-red-500">*</span></label>
        <input type="number" name="capacity" min="1" value="1" required
               class="w-full border border-slate-300 rounded-lg px-3.5 py-2.5 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
        <select name="status"
                class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
          {% for value, label in status_choices %}
          <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2">Capabilities</label>
      <div class="grid grid-cols-2 gap-2">
        {% for et in exp_types %}
        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" name="exp_type_ids" value="{{ et.pk }}" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
          <span class="text-slate-700">{{ et.name }}</span>
          <span class="text-xs text-slate-400">{{ et.lab_category }}</span>
        </label>
        {% endfor %}
      </div>
    </div>
  </div>

  <div class="flex justify-end gap-3">
    <a href="{% url 'web:equipment' %}"
       class="px-5 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-600 hover:bg-slate-50 transition cursor-pointer">Cancel</a>
    <button type="submit"
            class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition cursor-pointer">
      Create
    </button>
  </div>
</form>
{% endblock %}
