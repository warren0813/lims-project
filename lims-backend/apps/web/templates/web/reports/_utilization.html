{% if error %}
<p class="text-sm text-red-600">{{ error }}</p>
{% elif data %}
<p class="text-xs text-slate-400 mb-2">{{ start_date }} — {{ end_date }}</p>
<table class="w-full text-sm border border-slate-200 rounded-lg overflow-hidden">
  <thead class="bg-slate-50">
    <tr>
      <th class="px-4 py-2 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Equipment</th>
      <th class="px-4 py-2 text-right text-xs font-semibold text-slate-500 uppercase tracking-wide">Dispatches</th>
      <th class="px-4 py-2 text-right text-xs font-semibold text-slate-500 uppercase tracking-wide">Samples</th>
    </tr>
  </thead>
  <tbody class="divide-y divide-slate-100">
    {% for row in data %}
    <tr>
      <td class="px-4 py-2 text-slate-700">{{ row.equipment__name }}</td>
      <td class="px-4 py-2 text-right text-slate-700 font-mono">{{ row.wip_count }}</td>
      <td class="px-4 py-2 text-right text-slate-700 font-mono">{{ row.sample_count }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-sm text-slate-400">No data for the selected date range.</p>
{% endif %}
